services:
  - type: web
    name: fedyolo-dual-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: standard
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: MODEL_WEIGHTS_PATH
        value: "weights/best.pt"
